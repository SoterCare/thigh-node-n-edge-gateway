<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=800, initial-scale=1.0" />
  <title>SoterCare — Gait Monitor</title>
  <meta name="description" content="SoterCare real-time wearable health monitoring dashboard for Raspberry Pi 5 kiosk" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
    html, body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e2e8f0; overflow: hidden; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; }
    .card-accent { border-color: #3b82f6; }
    .neon-green { color: #4ade80; }
    .neon-blue  { color: #60a5fa; }
    .neon-red   { color: #f87171; }
    .neon-amber { color: #fbbf24; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
    .dot-green { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .dot-blue  { background: #60a5fa; box-shadow: 0 0 8px #60a5fa; }
    .dot-red   { background: #f87171; box-shadow: 0 0 8px #f87171; }
    .dot-gray  { background: #6b7280; animation: none; }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.4 } }
    .fall-alert { animation: flashRed 0.5s 4; }
    @keyframes flashRed { 0%,100%{ background: #111827} 50%{ background: #7f1d1d } }
    canvas { max-height: 100%; }
  </style>
</head>
<body class="h-screen w-screen p-3 flex flex-col gap-3" style="height:480px;width:800px;">

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-2 card">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm">SC</div>
      <div>
        <h1 class="font-bold text-base leading-none">SoterCare</h1>
        <p class="text-xs text-slate-400">Thigh Node Monitor</p>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <!-- Connection badge -->
      <div id="conn-badge" class="flex items-center gap-2 text-sm">
        <span class="status-dot dot-gray" id="conn-dot"></span>
        <span id="conn-label" class="text-slate-400 mono">Waiting...</span>
      </div>
      <!-- RSSI -->
      <div class="text-center">
        <div class="text-xs text-slate-500">RSSI</div>
        <div id="rssi-val" class="mono text-sm neon-blue">--</div>
      </div>
      <!-- Clock -->
      <div class="mono text-sm text-slate-300" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- Main grid -->
  <div class="flex gap-3 flex-1 min-h-0">

    <!-- Left: Charts -->
    <div class="flex flex-col gap-3 flex-1 min-w-0">

      <!-- Acceleration chart -->
      <div class="card p-3 flex-1 min-h-0">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Acceleration (g)</span>
          <span class="mono text-xs neon-green" id="g-total-val">G: --</span>
        </div>
        <div style="height:calc(100% - 24px);">
          <canvas id="accChart"></canvas>
        </div>
      </div>

      <!-- G_total chart -->
      <div class="card p-3" style="height:90px;">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Total G Force</div>
        <div style="height:60px;">
          <canvas id="gChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Right: Stat cards -->
    <div class="flex flex-col gap-3" style="width:200px;">

      <!-- Gait prediction -->
      <div class="card p-3">
        <div class="text-xs text-slate-500 mb-1">Gait Analysis</div>
        <div id="gait-label" class="font-bold text-lg neon-blue">—</div>
        <div class="text-xs text-slate-500 mt-1">Edge Impulse model</div>
      </div>

      <!-- Fall alert -->
      <div class="card p-3" id="fall-card">
        <div class="text-xs text-slate-500 mb-1">Fall Alert</div>
        <div id="fall-status" class="font-bold text-lg text-slate-400">Normal</div>
      </div>

      <!-- Temperature -->
      <div class="card p-3">
        <div class="text-xs text-slate-500 mb-1">Skin Temp</div>
        <div id="temp-val" class="mono font-bold text-2xl neon-amber">--°C</div>
      </div>

      <!-- Moisture -->
      <div class="card p-3">
        <div class="text-xs text-slate-500 mb-2">Moisture</div>
        <div id="moisture-val" class="mono font-bold text-xl text-slate-200">--%</div>
        <div class="w-full bg-slate-700 rounded h-2 mt-2">
          <div id="moisture-bar" class="bg-blue-500 h-2 rounded transition-all" style="width:0%"></div>
        </div>
      </div>

      <!-- Stream info -->
      <div class="card p-3 mt-auto">
        <div class="text-xs text-slate-500">Frames/s</div>
        <div id="fps-val" class="mono font-bold neon-green">--</div>
      </div>

    </div>
  </div>

  <script>
    // ── Clock ──────────────────────────────────────────────────────────────────
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-GB', {hour12: false});
    }
    setInterval(tick, 1000); tick();

    // ── Chart setup ───────────────────────────────────────────────────────────
    const MAX_POINTS = 200;

    function makeDataset(label, color) {
      return {
        label, borderColor: color, backgroundColor: color + '22',
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, data: [],
      };
    }

    const accCtx = document.getElementById('accChart').getContext('2d');
    const accChart = new Chart(accCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          makeDataset('AccX', '#f87171'),
          makeDataset('AccY', '#4ade80'),
          makeDataset('AccZ', '#60a5fa'),
        ]
      },
      options: {
        animation: false, responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 10, font: { size: 10 } } } },
        scales: {
          x: { display: false },
          y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } }
        }
      }
    });

    const gCtx = document.getElementById('gChart').getContext('2d');
    const gChart = new Chart(gCtx, {
      type: 'line',
      data: { labels: [], datasets: [ makeDataset('G_total', '#a78bfa') ] },
      options: {
        animation: false, responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: { min: 0, max: 3, ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: '#1e293b' } }
        }
      }
    });

    function pushChart(chart, values) {
      const ds = chart.data.datasets;
      chart.data.labels.push('');
      values.forEach((v, i) => ds[i].data.push(v));
      if (chart.data.labels.length > MAX_POINTS) {
        chart.data.labels.shift();
        ds.forEach(d => d.shift());
      }
      chart.update('none');
    }

    // ── FPS counter ───────────────────────────────────────────────────────────
    let frameCount = 0;
    setInterval(() => {
      document.getElementById('fps-val').textContent = frameCount;
      frameCount = 0;
    }, 1000);

    // ── WebSocket ─────────────────────────────────────────────────────────────
    const socket = io();

    socket.on('sensor_update', (d) => {
      frameCount++;
      const ax = parseFloat(d.accX), ay = parseFloat(d.accY), az = parseFloat(d.accZ);
      const g  = parseFloat(d.gTotal);

      // Charts
      pushChart(accChart, [ax, ay, az]);
      pushChart(gChart, [g]);

      // Stats
      document.getElementById('g-total-val').textContent = `G: ${g.toFixed(3)}`;
      document.getElementById('temp-val').textContent = `${parseFloat(d.temp).toFixed(1)}°C`;
      const moist = parseInt(d.moisture);
      document.getElementById('moisture-val').textContent = `${moist}%`;
      document.getElementById('moisture-bar').style.width = `${moist}%`;
      document.getElementById('rssi-val').textContent = d.rssi !== 'N/A' ? `${d.rssi} dBm` : 'BLE';

      // Gait
      const gaitEl = document.getElementById('gait-label');
      gaitEl.textContent = d.gaitLabel || '—';

      // Fall alert
      const fallCard = document.getElementById('fall-card');
      const fallEl   = document.getElementById('fall-status');
      if (d.fallAlert === '1') {
        fallEl.textContent = '⚠ FALL DETECTED';
        fallEl.className = 'font-bold text-base neon-red';
        fallCard.classList.add('fall-alert', 'card-accent');
        setTimeout(() => fallCard.classList.remove('fall-alert', 'card-accent'), 4000);
      } else {
        fallEl.textContent = 'Normal';
        fallEl.className = 'font-bold text-lg text-slate-400';
      }

      // Connection badge
      const dot   = document.getElementById('conn-dot');
      const label = document.getElementById('conn-label');
      if (d.source === 'wifi') {
        dot.className = 'status-dot dot-green';
        label.textContent = '📡 Wi-Fi';
        label.className = 'text-sm mono neon-green';
      } else if (d.source === 'ble') {
        dot.className = 'status-dot dot-blue';
        label.textContent = '🔵 BLE';
        label.className = 'text-sm mono neon-blue';
      }
    });

    socket.on('disconnect', () => {
      document.getElementById('conn-dot').className = 'status-dot dot-red';
      document.getElementById('conn-label').textContent = 'Disconnected';
    });
  </script>
</body>
</html>
